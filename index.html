<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青魔導士每週情報站</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"><\/script>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <script src="data.js"><\/script>

    <style>
        [v-cloak] { display: none; }
        html, body { height: 100%; margin: 0; }
        html { font-size: 18px; }
        body { line-height: 1.6; background-color: #0f172a; color: #d1d5db; }

        /* ── 整體版面 ── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 頂部標題列 */
        .top-bar {
            flex-shrink: 0;
            background-color: #0f172a;
            border-bottom: 1px solid #1e293b;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        /* 分頁 tab */
        .tab-bar {
            flex-shrink: 0;
            display: flex;
            gap: 0;
            border-bottom: 1px solid #1e293b;
            background-color: #0a1120;
            padding: 0 1.5rem;
        }
        .tab {
            padding: 0.6rem 1.25rem;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #64748b;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
            user-select: none;
        }
        .tab:hover { color: #94a3b8; }
        .tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }

        /* 主體：左右分割 */
        .main-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 左側：可捲動的主內容 */
        .left-panel {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            min-width: 0;
        }

        /* 右側：固定寬度技能索引 */
        .right-panel {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #1e293b;
            background-color: #0a1120;
            overflow: hidden;
        }
        .right-panel-header {
            flex-shrink: 0;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #1e293b;
        }
        .right-panel-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        /* 自訂捲軸 */
        .left-panel::-webkit-scrollbar,
        .right-panel-list::-webkit-scrollbar { width: 4px; }
        .left-panel::-webkit-scrollbar-track,
        .right-panel-list::-webkit-scrollbar-track { background: transparent; }
        .left-panel::-webkit-scrollbar-thumb,
        .right-panel-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

        /* 挑戰卡片 */
        .challenge-card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .skill-tag { cursor: pointer; transition: 0.2s; background-color: #334155; border: 1px solid #475569; color: #f1f5f9; }
        .skill-tag:hover { background-color: #475569; border-color: #94a3b8; }

        /* 搜尋框 */
        .search-input { background-color: #020617; border: 2px solid #1e293b; color: #ffffff; width: 100%; font-size: 13px; }
        .search-input:focus { outline: none; border-color: #3b82f6; }
        .search-input::placeholder { color: #475569; }

        /* 技能列表 item（右側精簡版）*/
        .skill-item {
            display: grid;
            grid-template-columns: 2rem 1fr auto;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.5rem;
            border-radius: 6px;
            transition: 0.15s;
            min-height: 2.2rem;
        }
        .skill-item:hover { background-color: #1e293b; }

        /* 來源 / 成就 tooltip */
        .source-tooltip { position: relative; display: inline-block; }
        .source-tooltip .source-full {
            visibility: hidden;
            min-width: 220px; max-width: 280px;
            background-color: #0f172a; color: #cbd5e1;
            border: 1px solid #475569; border-radius: 6px;
            padding: 8px 12px; font-size: 12px; line-height: 1.5;
            position: absolute; z-index: 100;
            bottom: 130%; right: 0;
            opacity: 0; transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            white-space: normal;
            pointer-events: none;
        }
        .source-tooltip:hover .source-full { visibility: visible; opacity: 1; }

        /* patch badge */
        .patch-badge {
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 4px;
            background-color: #1e3a5f;
            border: 1px solid #2563eb44;
            color: #60a5fa;
            font-family: monospace;
            white-space: nowrap;
        }

        /* 頁尾 */
        .footer-bar {
            flex-shrink: 0;
            border-top: 1px solid #1e293b;
            padding: 0.6rem 1.5rem;
            text-align: center;
        }
        .copyright-text { letter-spacing: 0.02em; }

        /* ── RWD：手機改回單欄 ── */
        @media (max-width: 768px) {
            #app { height: auto; overflow: visible; }
            .main-layout { flex-direction: column; overflow: visible; }
            .left-panel { overflow: visible; padding: 1rem; }
            .right-panel {
                width: 100%; border-left: none;
                border-top: 1px solid #1e293b;
                height: 60vh;
            }
            .top-bar { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div id="app" v-cloak>

    <!-- ── 頂部標題列 ── -->
    <header class="top-bar">
        <div>
            <h1 class="text-xl tracking-widest text-white font-black uppercase leading-tight">青魔導士每週情報</h1>
            <p class="text-slate-500 font-mono text-[11px] tracking-widest uppercase">Weekly Challenge & Database</p>
        </div>
        <div class="inline-block px-3 py-1 rounded-full border border-blue-500/30 bg-blue-500/10 text-blue-400 text-xs font-bold tracking-widest whitespace-nowrap">
            {{ weeklyDateRange }}
        </div>
    </header>

    <!-- ── 分頁列 ── -->
    <nav class="tab-bar">
        <div class="tab active">本週挑戰</div>
        <!-- 未來新增分頁只需在這裡加一個 .tab -->
    </nav>

    <!-- ── 主體 ── -->
    <div class="main-layout">

        <!-- 左側：本週挑戰內容 -->
        <main class="left-panel">
            <div class="space-y-4 max-w-xl">

                <div v-for="c in activeChallenges" :key="c.level" class="challenge-card p-5 shadow-lg">
                    <div class="flex justify-between items-center mb-4">
                        <span :class="c.tagClass" class="px-3 py-1 text-base rounded border font-black">{{ c.level }}</span>
                        <div class="text-right">
                            <div class="text-white text-base font-black">{{ c.stageName }}</div>
                            <div class="text-slate-500 font-mono text-xs uppercase">Stage {{ c.stageId }}</div>
                        </div>
                    </div>

                    <!-- 成就 -->
                    <div v-if="c.achievements.length > 0" class="flex flex-wrap gap-2 mb-4">
                        <div v-for="achName in c.achievements" class="source-tooltip">
                            <div class="text-xs text-amber-400 bg-amber-400/10 px-2 py-0.5 rounded border border-amber-400/20 font-bold cursor-help">
                                🏆 {{ achName }} ⓘ
                            </div>
                            <div class="source-full">{{ achievementDocs[achName] || '暫無說明' }}</div>
                        </div>
                    </div>

                    <!-- 推薦技能 -->
                    <div class="flex flex-wrap gap-1.5">
                        <span
                            v-for="s in c.recommendedSkills"
                            @click="goToSkill(s.no)"
                            class="skill-tag px-3 py-1 rounded text-xs font-bold"
                        >#{{ String(s.no).padStart(2, '0') }} {{ s.spell }}</span>
                    </div>
                </div>

            </div>
        </main>

        <!-- 右側：技能索引（固定、可捲動） -->
        <aside class="right-panel">
            <!-- 搜尋框 -->
            <div class="right-panel-header">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-xs font-black tracking-widest uppercase text-slate-400">技能索引</span>
                    <span class="text-xs text-slate-600 font-mono">{{ filteredSkills.length }} / {{ totalSkills }}</span>
                </div>
                <input
                    v-model="skillSearch"
                    type="text"
                    placeholder="搜尋名稱、來源或 #編號"
                    class="search-input rounded-lg px-3 py-2 font-bold"
                >
            </div>

            <!-- 技能列表 -->
            <div class="right-panel-list" ref="skillListEl">
                <div v-for="skill in filteredSkills" :key="skill.no" class="skill-item" :data-no="skill.no">
                    <span class="font-mono text-xs text-slate-600 font-bold">{{ String(skill.no).padStart(2, '0') }}</span>
                    <span class="text-white font-bold text-sm truncate">{{ skill.spell }}</span>
                    <div class="flex items-center gap-1.5 justify-end">
                        <span class="patch-badge">{{ skill.patch }}</span>
                        <div class="source-tooltip">
                            <span class="text-slate-500 text-xs cursor-help select-none">ⓘ</span>
                            <div class="source-full">{{ skill.source }}</div>
                        </div>
                    </div>
                </div>

                <div v-if="filteredSkills.length === 0" class="text-center py-10 text-slate-600 text-sm">
                    找不到相關技能
                </div>
            </div>
        </aside>

    </div>

    <!-- ── 頁尾 ── -->
    <footer class="footer-bar">
        <p class="text-[11px] text-slate-600 leading-relaxed copyright-text">
            FINAL FANTASY XIV © 2010 - 2026 SQUARE ENIX CO., LTD. All Rights Reserved．
            本站為玩家自製工具，與官方無關．Made by Nauyth
        </p>
    </footer>

</div>

<script>
    const { createApp, ref, computed, nextTick } = Vue;

    createApp({
        setup() {
            const lib     = typeof SKILLS_LIBRARY   !== 'undefined' ? SKILLS_LIBRARY   : [];
            const stages  = typeof STAGES_DATA      !== 'undefined' ? STAGES_DATA      : {};
            const achDocs = typeof ACHIEVEMENT_DOCS !== 'undefined' ? ACHIEVEMENT_DOCS : {};
            const config  = typeof WEEKLY_CONFIG    !== 'undefined' ? WEEKLY_CONFIG    : { dateRange: '', challenges: [] };

            const weeklyDateRange = config.dateRange;
            const skillSearch = ref('');
            const skillListEl = ref(null);
            const totalSkills = lib.length;

            // 挑戰卡片資料
            const activeChallenges = computed(() =>
                config.challenges.map(d => {
                    const tagClass =
                        d.level === "初級" ? "bg-emerald-900/40 text-emerald-400 border-emerald-500/20" :
                        d.level === "中級" ? "bg-sky-900/40 text-sky-400 border-sky-500/20" :
                                             "bg-purple-900/40 text-purple-400 border-purple-500/20";
                    const recommendedSkills = d.skills.map(no => {
                        const found = lib.find(s => s.no === no);
                        return found ?? { no, spell: '未知技能' };
                    });
                    return {
                        ...d,
                        stageName: d.stageId + '. ' + (stages[d.stageId] ?? '未知'),
                        tagClass,
                        recommendedSkills
                    };
                })
            );

            // 搜尋過濾
            const filteredSkills = computed(() => {
                const q = skillSearch.value.toLowerCase().trim();
                if (!q) return lib;
                const cleanNum = q.replace('#', '');
                if (/^\d+$/.test(cleanNum)) {
                    return lib.filter(s => s.no === parseInt(cleanNum));
                }
                return lib.filter(s =>
                    s.spell.toLowerCase().includes(q) ||
                    s.source.toLowerCase().includes(q) ||
                    s.patch.includes(q)
                );
            });

            // 點擊推薦技能 → 右側搜尋並捲動到該技能
            const goToSkill = async (no) => {
                skillSearch.value = '#' + String(no).padStart(2, '0');
                await nextTick();
                if (skillListEl.value) {
                    const target = skillListEl.value.querySelector('[data-no="' + no + '"]');
                    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            };

            return {
                weeklyDateRange,
                skillSearch,
                skillListEl,
                totalSkills,
                filteredSkills,
                goToSkill,
                activeChallenges,
                achievementDocs: achDocs
            };
        }
    }).mount('#app');
<\/script>
</body>
</html>
